<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .mono { font-family: 'Courier New', monospace; }
      .label { font-size: 11px; fill: #858585; }
      .text { font-size: 12px; fill: #d4d4d4; }
      .button { font-size: 13px; font-weight: 500; }
    </style>
  </defs>
  
  <!-- Window background -->
  <rect width="1200" height="800" fill="#1e1e1e"/>
  
  <!-- Header -->
  <rect width="1200" height="80" fill="#2d2d2d"/>
  <rect y="78" width="1200" height="2" fill="#007acc"/>
  <text x="30" y="35" class="title" font-size="28" fill="#4ec9b0" font-weight="bold">🤖 Android Log Analyzer (ALA)</text>
  <text x="30" y="60" class="title" font-size="14" fill="#858585">Analyze Android logs with time range filtering and AI-powered insights</text>
  
  <!-- Left Panel (Control Panel) -->
  <rect x="0" y="80" width="384" height="720" fill="#252526"/>
  <line x1="384" y1="80" x2="384" y2="800" stroke="#3e3e42" stroke-width="1"/>
  
  <!-- File Controls -->
  <rect x="20" y="100" width="344" height="40" rx="4" fill="#007acc"/>
  <text x="192" y="125" text-anchor="middle" class="button" fill="#ffffff">📁 Open Log File</text>
  <text x="30" y="155" class="text" font-size="10" fill="#4ec9b0">examples/sample-android.log</text>
  
  <!-- Filters Section -->
  <text x="20" y="190" class="title" font-size="16" fill="#4ec9b0" font-weight="bold">Filters</text>
  <line x1="20" y1="195" x2="364" y2="195" stroke="#3e3e42" stroke-width="1"/>
  
  <!-- Time inputs -->
  <text x="20" y="220" class="label">Start Time (MM-DD HH:MM:SS.mmm):</text>
  <rect x="20" y="225" width="160" height="32" rx="4" fill="#3c3c3c" stroke="#3e3e42" stroke-width="1"/>
  
  <text x="205" y="220" class="label">End Time:</text>
  <rect x="205" y="225" width="160" height="32" rx="4" fill="#3c3c3c" stroke="#3e3e42" stroke-width="1"/>
  
  <!-- Keywords input -->
  <text x="20" y="280" class="label">Keywords (regex supported):</text>
  <rect x="20" y="285" width="160" height="32" rx="4" fill="#3c3c3c" stroke="#3e3e42" stroke-width="1"/>
  <text x="25" y="305" class="text" font-size="11" fill="#666">error|crash|exception</text>
  
  <!-- Log Level -->
  <text x="205" y="280" class="label">Log Level:</text>
  <rect x="205" y="285" width="160" height="32" rx="4" fill="#3c3c3c" stroke="#3e3e42" stroke-width="1"/>
  <text x="210" y="305" class="text">All</text>
  
  <!-- Tag Filter -->
  <text x="20" y="340" class="label">Tag Filter (regex):</text>
  <rect x="20" y="345" width="160" height="32" rx="4" fill="#3c3c3c" stroke="#3e3e42" stroke-width="1"/>
  
  <!-- PID -->
  <text x="205" y="340" class="label">PID:</text>
  <rect x="205" y="345" width="160" height="32" rx="4" fill="#3c3c3c" stroke="#3e3e42" stroke-width="1"/>
  
  <!-- Apply buttons -->
  <rect x="20" y="395" width="260" height="40" rx="4" fill="#4ec9b0"/>
  <text x="150" y="420" text-anchor="middle" class="button" fill="#1e1e1e" font-weight="600">🔍 Apply Filters</text>
  <text x="305" y="420" class="button" fill="#858585">Clear</text>
  
  <!-- AI Section -->
  <text x="20" y="470" class="title" font-size="16" fill="#4ec9b0" font-weight="bold">AI Analysis</text>
  <line x1="20" y1="475" x2="364" y2="475" stroke="#3e3e42" stroke-width="1"/>
  
  <rect x="20" y="485" width="344" height="60" rx="4" fill="#3c3c3c" stroke="#3e3e42" stroke-width="1"/>
  <text x="25" y="505" class="text" font-size="11" fill="#666">Optional: Enter specific questions...</text>
  
  <rect x="20" y="560" width="344" height="40" rx="4" fill="#c586c0"/>
  <text x="192" y="585" text-anchor="middle" class="button" fill="#ffffff">🤖 Analyze with AI</text>
  
  <!-- Right Panel -->
  <!-- Stats Bar -->
  <rect x="384" y="80" width="816" height="50" fill="#252526"/>
  <line x1="384" y1="130" x2="1200" y2="130" stroke="#3e3e42" stroke-width="1"/>
  
  <text x="410" y="110" class="label">Total:</text>
  <text x="455" y="110" class="text" fill="#4ec9b0" font-weight="600">45</text>
  
  <text x="530" y="110" class="label">Filtered:</text>
  <text x="595" y="110" class="text" fill="#4ec9b0" font-weight="600">45</text>
  
  <text x="670" y="110" class="label">Errors:</text>
  <text x="725" y="110" class="text" fill="#f48771" font-weight="600">3</text>
  
  <text x="790" y="110" class="label">Warnings:</text>
  <text x="860" y="110" class="text" fill="#dcdcaa" font-weight="600">4</text>
  
  <!-- Tabs -->
  <rect x="384" y="130" width="816" height="45" fill="#252526"/>
  <line x1="384" y1="175" x2="1200" y2="175" stroke="#3e3e42" stroke-width="1"/>
  
  <text x="420" y="158" class="button" fill="#4ec9b0" font-weight="600">Log Viewer</text>
  <rect x="410" y="170" width="100" height="2" fill="#4ec9b0"/>
  
  <text x="560" y="158" class="button" fill="#858585">AI Analysis</text>
  
  <!-- Log Viewer Content -->
  <g class="mono">
    <!-- Log line 1 - Info -->
    <rect x="394" y="185" width="4" height="20" fill="#9cdcfe"/>
    <text x="405" y="199" font-size="12" fill="#608b4e">01-15 10:30:25.123</text>
    <text x="530" y="199" font-size="12" fill="#9cdcfe" font-weight="bold">I</text>
    <text x="545" y="199" font-size="12" fill="#c586c0">[MainActivity]</text>
    <text x="660" y="199" font-size="12" fill="#9cdcfe">User clicked login button</text>
    
    <!-- Log line 2 - Debug -->
    <rect x="394" y="210" width="4" height="20" fill="#4ec9b0"/>
    <text x="405" y="224" font-size="12" fill="#608b4e">01-15 10:30:25.234</text>
    <text x="530" y="224" font-size="12" fill="#4ec9b0" font-weight="bold">D</text>
    <text x="545" y="224" font-size="12" fill="#c586c0">[AuthService]</text>
    <text x="660" y="224" font-size="12" fill="#4ec9b0">Attempting login with username</text>
    
    <!-- Log line 3 - Debug -->
    <rect x="394" y="235" width="4" height="20" fill="#4ec9b0"/>
    <text x="405" y="249" font-size="12" fill="#608b4e">01-15 10:30:25.345</text>
    <text x="530" y="249" font-size="12" fill="#4ec9b0" font-weight="bold">D</text>
    <text x="545" y="249" font-size="12" fill="#c586c0">[NetworkManager]</text>
    <text x="660" y="249" font-size="12" fill="#4ec9b0">POST /api/auth/login</text>
    
    <!-- Log line 4 - Info -->
    <rect x="394" y="260" width="4" height="20" fill="#9cdcfe"/>
    <text x="405" y="274" font-size="12" fill="#608b4e">01-15 10:30:26.456</text>
    <text x="530" y="274" font-size="12" fill="#9cdcfe" font-weight="bold">I</text>
    <text x="545" y="274" font-size="12" fill="#c586c0">[NetworkManager]</text>
    <text x="660" y="274" font-size="12" fill="#9cdcfe">Request headers configured</text>
    
    <!-- Log line 5 - Warning -->
    <rect x="394" y="285" width="4" height="20" fill="#dcdcaa"/>
    <text x="405" y="299" font-size="12" fill="#608b4e">01-15 10:30:27.567</text>
    <text x="530" y="299" font-size="12" fill="#dcdcaa" font-weight="bold">W</text>
    <text x="545" y="299" font-size="12" fill="#c586c0">[NetworkManager]</text>
    <text x="660" y="299" font-size="12" fill="#dcdcaa">Connection timeout after 500ms</text>
    
    <!-- Log line 6 - Error -->
    <rect x="394" y="310" width="4" height="20" fill="#f48771"/>
    <text x="405" y="324" font-size="12" fill="#608b4e">01-15 10:30:27.891</text>
    <text x="530" y="324" font-size="12" fill="#f48771" font-weight="bold">E</text>
    <text x="545" y="324" font-size="12" fill="#c586c0">[AuthService]</text>
    <text x="660" y="324" font-size="12" fill="#f48771">Login failed: NetworkException</text>
    
    <!-- More log lines... -->
    <text x="405" y="360" font-size="11" fill="#666">... 39 more log lines ...</text>
  </g>
  
  <!-- Bottom note -->
  <text x="600" y="790" text-anchor="middle" font-size="10" fill="#666">Dark theme with TailwindCSS • Syntax highlighting • Real-time filtering • AI-powered analysis</text>
</svg>
