<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <style>
      .ui-font { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <!-- Clip for sider scrollable area -->
    <clipPath id="sider-clip">
      <rect x="0" y="64" width="380" height="836"/>
    </clipPath>
    <clipPath id="content-clip">
      <rect x="380" y="64" width="1020" height="836"/>
    </clipPath>
  </defs>

  <!-- ===== WINDOW BACKGROUND ===== -->
  <rect width="1400" height="900" fill="#1e1e1e"/>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="1400" height="64" fill="#1e1e1e"/>
  <rect x="0" y="62" width="1400" height="2" fill="#4ec9b0"/>
  <!-- Title -->
  <text x="32" y="40" class="ui-font" font-size="26" fill="#4ec9b0" font-weight="600">🤖 Android Log Analyzer (ALA)</text>
  <!-- Language toggle button -->
  <rect x="1190" y="14" width="108" height="36" rx="6" fill="transparent" stroke="#4ec9b0" stroke-width="1"/>
  <text x="1244" y="37" class="ui-font" font-size="13" fill="#4ec9b0" text-anchor="middle">简体中文</text>
  <!-- Theme toggle button -->
  <rect x="1312" y="14" width="56" height="36" rx="6" fill="transparent" stroke="#4ec9b0" stroke-width="1"/>
  <text x="1340" y="37" class="ui-font" font-size="18" fill="#4ec9b0" text-anchor="middle">💡</text>

  <!-- ===== SIDER (380px) ===== -->
  <rect x="0" y="64" width="380" height="836" fill="#252526"/>
  <rect x="379" y="64" width="1" height="836" fill="#3e3e42"/>

  <!-- Sider content (clipped) -->
  <g clip-path="url(#sider-clip)">
    <!-- Open Log File button -->
    <rect x="16" y="80" width="348" height="40" rx="6" fill="#4ec9b0"/>
    <text x="190" y="105" class="ui-font" font-size="14" fill="#1e1e1e" text-anchor="middle" font-weight="600">📁  Open Log File(s)</text>

    <!-- Loaded files -->
    <rect x="16" y="130" width="348" height="28" rx="4" fill="#2d2d2d"/>
    <text x="26" y="149" class="ui-font" font-size="12" fill="#d4d4d4">📄 system.log</text>
    <rect x="16" y="162" width="348" height="28" rx="4" fill="#2d2d2d"/>
    <text x="26" y="181" class="ui-font" font-size="12" fill="#d4d4d4">📄 app.log</text>

    <!-- Divider: Filters -->
    <line x1="16" y1="203" x2="140" y2="203" stroke="#3e3e42" stroke-width="1"/>
    <text x="190" y="207" class="ui-font" font-size="13" fill="#858585" text-anchor="middle">Filters</text>
    <line x1="240" y1="203" x2="364" y2="203" stroke="#3e3e42" stroke-width="1"/>

    <!-- Time Range label + RangePicker -->
    <text x="16" y="228" class="ui-font" font-size="12" fill="#d4d4d4">Time Range</text>
    <rect x="16" y="234" width="348" height="32" rx="6" fill="#1e1e1e" stroke="#3e3e42" stroke-width="1"/>
    <text x="190" y="255" class="ui-font" font-size="11" fill="#858585" text-anchor="middle">Start Date ~ End Date</text>

    <!-- Keywords label + input -->
    <text x="16" y="284" class="ui-font" font-size="12" fill="#d4d4d4">Keywords (Filter)</text>
    <rect x="16" y="290" width="348" height="32" rx="6" fill="#1e1e1e" stroke="#3e3e42" stroke-width="1"/>
    <text x="26" y="311" class="ui-font" font-size="11" fill="#858585">e.g., error|crash|exception</text>

    <!-- Highlights label + input -->
    <text x="16" y="340" class="ui-font" font-size="12" fill="#d4d4d4">Highlights (Visual Only)</text>
    <rect x="16" y="346" width="348" height="32" rx="6" fill="#1e1e1e" stroke="#4ec9b0" stroke-width="1.5"/>
    <text x="26" y="367" class="ui-font" font-size="11" fill="#d4d4d4">OOM|memory</text>

    <!-- Log Level label + select -->
    <text x="16" y="397" class="ui-font" font-size="12" fill="#d4d4d4">Log Level</text>
    <rect x="16" y="403" width="348" height="32" rx="6" fill="#1e1e1e" stroke="#3e3e42" stroke-width="1"/>
    <text x="26" y="424" class="ui-font" font-size="11" fill="#d4d4d4">All Levels</text>
    <text x="350" y="424" class="ui-font" font-size="10" fill="#858585" text-anchor="end">▾</text>

    <!-- Tag Filter label + input -->
    <text x="16" y="453" class="ui-font" font-size="12" fill="#d4d4d4">Tag Filter (regex)</text>
    <rect x="16" y="459" width="348" height="32" rx="6" fill="#1e1e1e" stroke="#3e3e42" stroke-width="1"/>
    <text x="26" y="480" class="ui-font" font-size="11" fill="#858585">e.g., ActivityManager</text>

    <!-- Process ID label + input -->
    <text x="16" y="509" class="ui-font" font-size="12" fill="#d4d4d4">Process ID</text>
    <rect x="16" y="515" width="348" height="32" rx="6" fill="#1e1e1e" stroke="#3e3e42" stroke-width="1"/>
    <text x="26" y="536" class="ui-font" font-size="11" fill="#858585">e.g., 1234</text>

    <!-- Search + Clear Filters buttons -->
    <rect x="16" y="563" width="232" height="36" rx="6" fill="#4ec9b0"/>
    <text x="132" y="586" class="ui-font" font-size="13" fill="#1e1e1e" text-anchor="middle" font-weight="600">🔍  Search</text>
    <rect x="254" y="563" width="110" height="36" rx="6" fill="#2d2d2d" stroke="#3e3e42" stroke-width="1"/>
    <text x="309" y="586" class="ui-font" font-size="13" fill="#d4d4d4" text-anchor="middle">✕  Clear</text>

    <!-- Apply Preset divider -->
    <line x1="16" y1="613" x2="115" y2="613" stroke="#3e3e42" stroke-width="1"/>
    <text x="190" y="617" class="ui-font" font-size="13" fill="#858585" text-anchor="middle">Apply Preset</text>
    <line x1="265" y1="613" x2="364" y2="613" stroke="#3e3e42" stroke-width="1"/>

    <!-- Preset multi-select -->
    <rect x="16" y="626" width="348" height="32" rx="6" fill="#1e1e1e" stroke="#3e3e42" stroke-width="1"/>
    <text x="26" y="647" class="ui-font" font-size="11" fill="#858585">Select preset(s) to apply...</text>
    <text x="350" y="647" class="ui-font" font-size="10" fill="#858585" text-anchor="end">▾</text>

    <!-- Separator -->
    <line x1="16" y1="702" x2="364" y2="702" stroke="#3e3e42" stroke-width="1"/>

    <!-- Bottom buttons: Manage Presets + Settings -->
    <rect x="16" y="712" width="348" height="36" rx="6" fill="#2d2d2d" stroke="#3e3e42" stroke-width="1"/>
    <text x="190" y="735" class="ui-font" font-size="13" fill="#d4d4d4" text-anchor="middle">⚙️  Manage Presets</text>
    <rect x="16" y="756" width="348" height="36" rx="6" fill="#2d2d2d" stroke="#3e3e42" stroke-width="1"/>
    <text x="190" y="779" class="ui-font" font-size="13" fill="#d4d4d4" text-anchor="middle">🔧  Settings</text>
  </g>

  <!-- ===== CONTENT AREA ===== -->
  <rect x="380" y="64" width="1020" height="836" fill="#1e1e1e"/>

  <g clip-path="url(#content-clip)">
    <!-- Tabs bar -->
    <rect x="380" y="64" width="1020" height="46" fill="#252526"/>
    <line x1="380" y1="110" x2="1400" y2="110" stroke="#3e3e42" stroke-width="1"/>
    <!-- Log Viewer tab (active) -->
    <text x="440" y="93" class="ui-font" font-size="14" fill="#4ec9b0" font-weight="600">Log Viewer</text>
    <rect x="420" y="107" width="100" height="3" fill="#4ec9b0" rx="1"/>
    <!-- AI Analysis tab -->
    <text x="570" y="93" class="ui-font" font-size="14" fill="#858585">AI Analysis</text>

    <!-- Stats bar -->
    <rect x="380" y="110" width="1020" height="44" fill="#2d2d2d"/>
    <line x1="380" y1="154" x2="1400" y2="154" stroke="#3e3e42" stroke-width="1"/>
    <text x="400" y="136" class="ui-font" font-size="11" fill="#858585">Total:</text>
    <text x="438" y="136" class="ui-font" font-size="13" fill="#4ec9b0" font-weight="600">248</text>
    <text x="490" y="136" class="ui-font" font-size="11" fill="#858585">Shown:</text>
    <text x="535" y="136" class="ui-font" font-size="13" fill="#4ec9b0" font-weight="600">87</text>
    <text x="585" y="136" class="ui-font" font-size="11" fill="#858585">Files:</text>
    <text x="618" y="136" class="ui-font" font-size="13" fill="#60a5fa" font-weight="600">2</text>
    <text x="650" y="136" class="ui-font" font-size="11" fill="#858585">Error:</text>
    <text x="688" y="136" class="ui-font" font-size="13" fill="#f87171" font-weight="600">12</text>
    <text x="724" y="136" class="ui-font" font-size="11" fill="#858585">Warn:</text>
    <text x="762" y="136" class="ui-font" font-size="13" fill="#facc15" font-weight="600">31</text>
    <text x="798" y="136" class="ui-font" font-size="11" fill="#858585">Info:</text>
    <text x="832" y="136" class="ui-font" font-size="13" fill="#60a5fa" font-weight="600">44</text>
    <!-- Line break toggle -->
    <rect x="1230" y="120" width="80" height="24" rx="4" fill="#1e1e1e" stroke="#3e3e42" stroke-width="1"/>
    <text x="1270" y="136" class="ui-font" font-size="11" fill="#858585" text-anchor="middle">Word Wrap</text>
    <!-- Collapse sider icon -->
    <text x="1370" y="136" class="ui-font" font-size="14" fill="#858585" text-anchor="middle">◀</text>

    <!-- Log lines area -->
    <!-- Log line 1 — Error -->
    <rect x="380" y="158" width="4" height="26" fill="#f87171"/>
    <text x="392" y="175" class="mono" font-size="12" fill="#858585">#1</text>
    <text x="418" y="175" class="mono" font-size="12" fill="#16a34a">01-15 10:30:24.512</text>
    <text x="568" y="175" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="175" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="660" y="175" class="mono" font-size="12" fill="#f87171" font-weight="bold">E</text>
    <text x="680" y="175" class="mono" font-size="12" fill="#c084fc">[NetworkManager]</text>
    <text x="832" y="175" class="mono" font-size="12" fill="#d4d4d4">Connection refused: retry limit exceeded</text>

    <!-- Log line 2 — Warning -->
    <rect x="380" y="186" width="4" height="26" fill="#facc15"/>
    <text x="392" y="203" class="mono" font-size="12" fill="#858585">#2</text>
    <text x="418" y="203" class="mono" font-size="12" fill="#16a34a">01-15 10:30:25.123</text>
    <text x="568" y="203" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="203" class="mono" font-size="12" fill="#f59e0b">5679</text>
    <text x="660" y="203" class="mono" font-size="12" fill="#facc15" font-weight="bold">W</text>
    <text x="680" y="203" class="mono" font-size="12" fill="#c084fc">[AuthService]</text>
    <text x="800" y="203" class="mono" font-size="12" fill="#d4d4d4">Token expiry warning: refresh soon</text>

    <!-- Log line 3 — Info -->
    <rect x="380" y="214" width="4" height="26" fill="#60a5fa"/>
    <text x="392" y="231" class="mono" font-size="12" fill="#858585">#3</text>
    <text x="418" y="231" class="mono" font-size="12" fill="#16a34a">01-15 10:30:25.234</text>
    <text x="568" y="231" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="231" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="660" y="231" class="mono" font-size="12" fill="#60a5fa" font-weight="bold">I</text>
    <text x="680" y="231" class="mono" font-size="12" fill="#c084fc">[MainActivity]</text>
    <text x="800" y="231" class="mono" font-size="12" fill="#d4d4d4">User session started successfully</text>

    <!-- Log line 4 — Debug -->
    <rect x="380" y="242" width="4" height="26" fill="#4ade80"/>
    <text x="392" y="259" class="mono" font-size="12" fill="#858585">#4</text>
    <text x="418" y="259" class="mono" font-size="12" fill="#16a34a">01-15 10:30:25.456</text>
    <text x="568" y="259" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="259" class="mono" font-size="12" fill="#f59e0b">5680</text>
    <text x="660" y="259" class="mono" font-size="12" fill="#4ade80" font-weight="bold">D</text>
    <text x="680" y="259" class="mono" font-size="12" fill="#c084fc">[CacheManager]</text>
    <text x="800" y="259" class="mono" font-size="12" fill="#d4d4d4">Cache hit ratio: 94.3%</text>

    <!-- Log line 5 — Error with highlight -->
    <rect x="380" y="270" width="4" height="26" fill="#f87171"/>
    <text x="392" y="287" class="mono" font-size="12" fill="#858585">#5</text>
    <text x="418" y="287" class="mono" font-size="12" fill="#16a34a">01-15 10:30:26.001</text>
    <text x="568" y="287" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="287" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="660" y="287" class="mono" font-size="12" fill="#f87171" font-weight="bold">E</text>
    <text x="680" y="287" class="mono" font-size="12" fill="#c084fc">[MemoryMonitor]</text>
    <text x="800" y="287" class="mono" font-size="12" fill="#d4d4d4">OOM detected: </text>
    <!-- Highlighted "OOM" -->
    <rect x="800" y="273" width="34" height="16" fill="rgba(234,179,8,0.35)" rx="2"/>
    <text x="817" y="287" class="mono" font-size="12" fill="#eab308" text-anchor="middle">OOM</text>
    <text x="838" y="287" class="mono" font-size="12" fill="#d4d4d4"> detected: heap 98% used, GC overhead</text>

    <!-- Log line 6 — Info -->
    <rect x="380" y="298" width="4" height="26" fill="#60a5fa"/>
    <text x="392" y="315" class="mono" font-size="12" fill="#858585">#6</text>
    <text x="418" y="315" class="mono" font-size="12" fill="#16a34a">01-15 10:30:26.345</text>
    <text x="568" y="315" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="315" class="mono" font-size="12" fill="#f59e0b">5681</text>
    <text x="660" y="315" class="mono" font-size="12" fill="#60a5fa" font-weight="bold">I</text>
    <text x="680" y="315" class="mono" font-size="12" fill="#c084fc">[DatabaseHelper]</text>
    <text x="800" y="315" class="mono" font-size="12" fill="#d4d4d4">Query executed in 42ms (index scan)</text>

    <!-- Log line 7 — Warning -->
    <rect x="380" y="326" width="4" height="26" fill="#facc15"/>
    <text x="392" y="343" class="mono" font-size="12" fill="#858585">#7</text>
    <text x="418" y="343" class="mono" font-size="12" fill="#16a34a">01-15 10:30:27.111</text>
    <text x="568" y="343" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="343" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="660" y="343" class="mono" font-size="12" fill="#facc15" font-weight="bold">W</text>
    <text x="680" y="343" class="mono" font-size="12" fill="#c084fc">[NetworkManager]</text>
    <text x="800" y="343" class="mono" font-size="12" fill="#d4d4d4">Slow network response: 2340ms</text>

    <!-- Log line 8 — Debug -->
    <rect x="380" y="354" width="4" height="26" fill="#4ade80"/>
    <text x="392" y="371" class="mono" font-size="12" fill="#858585">#8</text>
    <text x="418" y="371" class="mono" font-size="12" fill="#16a34a">01-15 10:30:27.678</text>
    <text x="568" y="371" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="371" class="mono" font-size="12" fill="#f59e0b">5682</text>
    <text x="660" y="371" class="mono" font-size="12" fill="#4ade80" font-weight="bold">D</text>
    <text x="680" y="371" class="mono" font-size="12" fill="#c084fc">[UIThread]</text>
    <text x="800" y="371" class="mono" font-size="12" fill="#d4d4d4">Frame rendered in 16ms (60fps target)</text>

    <!-- Log line 9 — Error with highlight -->
    <rect x="380" y="382" width="4" height="26" fill="#f87171"/>
    <text x="392" y="399" class="mono" font-size="12" fill="#858585">#9</text>
    <text x="418" y="399" class="mono" font-size="12" fill="#16a34a">01-15 10:30:28.002</text>
    <text x="568" y="399" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="614" y="399" class="mono" font-size="12" fill="#f59e0b">5678</text>
    <text x="660" y="399" class="mono" font-size="12" fill="#f87171" font-weight="bold">E</text>
    <text x="680" y="399" class="mono" font-size="12" fill="#c084fc">[MemoryMonitor]</text>
    <!-- Highlighted "memory" -->
    <rect x="800" y="385" width="50" height="16" fill="rgba(234,179,8,0.35)" rx="2"/>
    <text x="825" y="399" class="mono" font-size="12" fill="#eab308" text-anchor="middle">memory</text>
    <text x="852" y="399" class="mono" font-size="12" fill="#d4d4d4"> leak detected in MediaPlayer component</text>

    <!-- Log line 10 — Verbose -->
    <rect x="380" y="410" width="4" height="26" fill="#9ca3af"/>
    <text x="392" y="427" class="mono" font-size="12" fill="#858585">#10</text>
    <text x="420" y="427" class="mono" font-size="12" fill="#16a34a">01-15 10:30:28.456</text>
    <text x="568" y="427" class="mono" font-size="12" fill="#f59e0b">5679</text>
    <text x="614" y="427" class="mono" font-size="12" fill="#f59e0b">5679</text>
    <text x="660" y="427" class="mono" font-size="12" fill="#9ca3af" font-weight="bold">V</text>
    <text x="680" y="427" class="mono" font-size="12" fill="#c084fc">[SensorManager]</text>
    <text x="800" y="427" class="mono" font-size="12" fill="#d4d4d4">Accelerometer reading: x=0.02 y=9.81</text>

    <!-- Scrollbar -->
    <rect x="1388" y="154" width="12" height="836" fill="#2d2d2d" rx="6"/>
    <rect x="1390" y="160" width="8" height="120" fill="#555" rx="4"/>
  </g>

  <!-- ===== FLOATING AI BUTTON ===== -->
  <circle cx="1360" cy="852" r="28" fill="#c084fc"/>
  <text x="1360" y="860" class="ui-font" font-size="20" text-anchor="middle" fill="#fff">🤖</text>
</svg>
