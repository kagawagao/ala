<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .mono { font-family: 'Courier New', monospace; }
      .label { font-size: 11px; fill: #858585; }
      .text { font-size: 12px; fill: #d4d4d4; }
      .button { font-size: 13px; font-weight: 500; }
      .highlight { fill: #ffd700; opacity: 0.3; }
      .react-badge { fill: #61dafb; }
      .ts-badge { fill: #3178c6; }
    </style>
  </defs>
  
  <!-- Window background -->
  <rect width="1200" height="800" fill="#1e1e1e"/>
  
  <!-- Header -->
  <rect width="1200" height="80" fill="#2d2d2d"/>
  <rect y="78" width="1200" height="2" fill="#007acc"/>
  <text x="30" y="35" class="title" font-size="28" fill="#4ec9b0" font-weight="bold">🤖 Android Log Analyzer (ALA)</text>
  <text x="30" y="60" class="title" font-size="14" fill="#858585">React + TypeScript • Import/Export Filters • Advanced Features</text>
  
  <!-- React + TypeScript badges -->
  <g transform="translate(950, 15)">
    <rect width="90" height="25" rx="12" class="react-badge"/>
    <text x="45" y="17" text-anchor="middle" class="title" font-size="12" fill="#000" font-weight="bold">⚛️ React</text>
  </g>
  <g transform="translate(1050, 15)">
    <rect width="120" height="25" rx="12" class="ts-badge"/>
    <text x="60" y="17" text-anchor="middle" class="title" font-size="12" fill="#fff" font-weight="bold">TS TypeScript</text>
  </g>
  
  <!-- Left Panel (Control Panel) -->
  <rect x="0" y="80" width="384" height="720" fill="#252526"/>
  <line x1="384" y1="80" x2="384" y2="800" stroke="#3e3e42" stroke-width="1"/>
  
  <!-- File Controls -->
  <rect x="20" y="100" width="344" height="40" rx="4" fill="#007acc"/>
  <text x="192" y="125" text-anchor="middle" class="button" fill="#ffffff">📁 Open Log File(s)</text>
  <text x="30" y="155" class="text" font-size="10" fill="#4ec9b0">📄 3 files loaded</text>
  
  <!-- Filters Section -->
  <text x="20" y="190" class="title" font-size="16" fill="#4ec9b0" font-weight="bold">Filters</text>
  <line x1="20" y1="195" x2="364" y2="195" stroke="#3e3e42" stroke-width="1"/>
  
  <!-- Keywords input -->
  <text x="20" y="240" class="label">Keywords (regex supported):</text>
  <rect x="20" y="245" width="160" height="32" rx="4" fill="#3c3c3c" stroke="#3e3e42" stroke-width="1"/>
  <text x="25" y="265" class="text" font-size="11" fill="#d4d4d4">error|warning</text>
  
  <!-- Apply/Clear buttons -->
  <rect x="20" y="295" width="260" height="40" rx="4" fill="#4ec9b0"/>
  <text x="150" y="320" text-anchor="middle" class="button" fill="#1e1e1e" font-weight="600">🔍 Apply Filters</text>
  
  <!-- Save/Load buttons -->
  <rect x="20" y="345" width="162" height="32" rx="4" fill="transparent" stroke="#007acc" stroke-width="1"/>
  <text x="101" y="365" text-anchor="middle" class="button" fill="#007acc" font-size="11">💾 Save</text>
  <rect x="192" y="345" width="172" height="32" rx="4" fill="transparent" stroke="#007acc" stroke-width="1"/>
  <text x="278" y="365" text-anchor="middle" class="button" fill="#007acc" font-size="11">📂 Load</text>
  
  <!-- NEW: Import/Export buttons -->
  <text x="20" y="400" class="title" font-size="12" fill="#c586c0" font-weight="bold">⭐ NEW: Import/Export</text>
  <rect x="20" y="410" width="162" height="32" rx="4" fill="transparent" stroke="#c586c0" stroke-width="1"/>
  <text x="101" y="430" text-anchor="middle" class="button" fill="#c586c0" font-size="11">📥 Import</text>
  <rect x="192" y="410" width="172" height="32" rx="4" fill="transparent" stroke="#c586c0" stroke-width="1"/>
  <text x="278" y="430" text-anchor="middle" class="button" fill="#c586c0" font-size="11">📤 Export</text>
  
  <!-- Architecture info -->
  <text x="20" y="480" class="title" font-size="12" fill="#4ec9b0" font-weight="bold">✨ Architecture:</text>
  <text x="30" y="500" class="text" font-size="10" fill="#d4d4d4">• React components</text>
  <text x="30" y="515" class="text" font-size="10" fill="#d4d4d4">• TypeScript types</text>
  <text x="30" y="530" class="text" font-size="10" fill="#d4d4d4">• Context isolation</text>
  <text x="30" y="545" class="text" font-size="10" fill="#d4d4d4">• Webpack bundling</text>
  
  <!-- Right Panel -->
  <!-- Stats Bar -->
  <rect x="384" y="80" width="816" height="50" fill="#252526"/>
  <line x1="384" y1="130" x2="1200" y2="130" stroke="#3e3e42" stroke-width="1"/>
  
  <text x="410" y="110" class="label">Total:</text>
  <text x="455" y="110" class="text" fill="#4ec9b0" font-weight="600">125</text>
  
  <text x="530" y="110" class="label">Filtered:</text>
  <text x="595" y="110" class="text" fill="#4ec9b0" font-weight="600">45</text>
  
  <text x="670" y="110" class="label">Files:</text>
  <text x="715" y="110" class="text" fill="#007acc" font-weight="600">3</text>
  
  <text x="780" y="110" class="label">Errors:</text>
  <text x="835" y="110" class="text" fill="#f48771" font-weight="600">8</text>
  
  <!-- Tabs -->
  <rect x="384" y="130" width="816" height="45" fill="#252526"/>
  <line x1="384" y1="175" x2="1200" y2="175" stroke="#3e3e42" stroke-width="1"/>
  
  <text x="420" y="158" class="button" fill="#4ec9b0" font-weight="600">Log Viewer</text>
  <rect x="410" y="170" width="100" height="2" fill="#4ec9b0"/>
  
  <text x="550" y="158" class="button" fill="#858585">AI Analysis</text>
  
  <!-- Log Viewer Content -->
  <g class="mono">
    <!-- Log line 1 -->
    <rect x="394" y="185" width="4" height="20" fill="#f48771"/>
    <text x="405" y="199" font-size="12" fill="#608b4e">01-15 10:30:25.890</text>
    <text x="530" y="199" font-size="12" fill="#f48771" font-weight="bold">E</text>
    <text x="545" y="199" font-size="9" fill="#666">📄app1.log</text>
    <text x="615" y="199" font-size="12" fill="#c586c0">[NetworkManager]</text>
    <text x="750" y="199" font-size="12" fill="#f48771">Connection </text>
    <rect x="830" y="187" width="35" height="14" class="highlight" fill="#ffd700"/>
    <text x="830" y="199" font-size="12" fill="#ffd700">error</text>
    
    <!-- Log line 2 -->
    <rect x="394" y="210" width="4" height="20" fill="#dcdcaa"/>
    <text x="405" y="224" font-size="12" fill="#608b4e">01-15 10:30:26.123</text>
    <text x="530" y="224" font-size="12" fill="#dcdcaa" font-weight="bold">W</text>
    <text x="545" y="224" font-size="9" fill="#666">📄app2.log</text>
    <text x="615" y="224" font-size="12" fill="#c586c0">[AuthService]</text>
    <rect x="750" y="212" width="58" height="14" class="highlight" fill="#ffd700"/>
    <text x="750" y="224" font-size="12" fill="#ffd700">Warning</text>
    
    <!-- Log line 3 -->
    <rect x="394" y="235" width="4" height="20" fill="#9cdcfe"/>
    <text x="405" y="249" font-size="12" fill="#608b4e">01-15 10:30:27.234</text>
    <text x="530" y="249" font-size="12" fill="#9cdcfe" font-weight="bold">I</text>
    <text x="545" y="249" font-size="9" fill="#666">📄app1.log</text>
    <text x="615" y="249" font-size="12" fill="#c586c0">[MainActivity]</text>
    <text x="750" y="249" font-size="12" fill="#9cdcfe">User session started</text>
  </g>
  
  <!-- Feature annotations -->
  <!-- Arrow to Import/Export -->
  <line x1="370" y1="425" x2="420" y2="455" stroke="#c586c0" stroke-width="2" marker-end="url(#arrowpurple)"/>
  <text x="280" y="420" font-size="10" fill="#c586c0" font-weight="bold">Import/Export</text>
  <text x="280" y="432" font-size="10" fill="#c586c0" font-weight="bold">filters to JSON</text>
  
  <!-- Arrow to React badge -->
  <line x1="930" y1="50" x2="980" y2="30" stroke="#61dafb" stroke-width="2" marker-end="url(#arrowreact)"/>
  <text x="820" y="55" font-size="10" fill="#61dafb" font-weight="bold">React +</text>
  <text x="820" y="67" font-size="10" fill="#61dafb" font-weight="bold">TypeScript</text>
  
  <!-- Component labels -->
  <rect x="20" y="650" width="344" height="130" rx="4" fill="#1e1e1e" stroke="#c586c0" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="192" y="670" text-anchor="middle" font-size="11" fill="#c586c0" font-weight="bold">&lt;ControlPanel /&gt;</text>
  <text x="30" y="690" font-size="9" fill="#858585">• React Component</text>
  <text x="30" y="705" font-size="9" fill="#858585">• Props-based</text>
  <text x="30" y="720" font-size="9" fill="#858585">• Type-safe</text>
  <text x="30" y="735" font-size="9" fill="#858585">• All filter controls</text>
  <text x="30" y="750" font-size="9" fill="#858585">• Import/Export UI</text>
  <text x="30" y="765" font-size="9" fill="#858585">• AI trigger</text>
  
  <rect x="400" y="650" width="380" height="130" rx="4" fill="#1e1e1e" stroke="#c586c0" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="590" y="670" text-anchor="middle" font-size="11" fill="#c586c0" font-weight="bold">&lt;LogViewer /&gt;</text>
  <text x="410" y="690" font-size="9" fill="#858585">• React Component</text>
  <text x="410" y="705" font-size="9" fill="#858585">• Virtual DOM</text>
  <text x="410" y="720" font-size="9" fill="#858585">• Keyword highlighting</text>
  <text x="410" y="735" font-size="9" fill="#858585">• Statistics display</text>
  <text x="410" y="750" font-size="9" fill="#858585">• Tab navigation</text>
  <text x="410" y="765" font-size="9" fill="#858585">• Performance optimized</text>
  
  <!-- Bottom note -->
  <text x="600" y="790" text-anchor="middle" font-size="10" fill="#666">React + TypeScript Architecture • Import/Export Filters • Production Ready</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c586c0" />
    </marker>
    <marker id="arrowreact" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#61dafb" />
    </marker>
  </defs>
</svg>
