<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#58a6ff" flood-opacity="0.25"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#58a6ff" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Decorative circuit lines (subtle tech pattern) -->
  <g opacity="0.08" stroke="#58a6ff" stroke-width="1.5" fill="none">
    <path d="M80 120 H160 V200"/>
    <path d="M432 120 H352 V200"/>
    <path d="M80 392 H160 V312"/>
    <path d="M432 392 H352 V312"/>
    <circle cx="160" cy="120" r="3" fill="#58a6ff"/>
    <circle cx="352" cy="120" r="3" fill="#58a6ff"/>
    <circle cx="160" cy="392" r="3" fill="#58a6ff"/>
    <circle cx="352" cy="392" r="3" fill="#58a6ff"/>
  </g>

  <!-- Central terminal/document shape -->
  <g filter="url(#shadow)">
    <rect x="120" y="100" width="272" height="280" rx="16" fill="#21262d" stroke="#30363d" stroke-width="2"/>

    <!-- Terminal title bar -->
    <rect x="120" y="100" width="272" height="36" rx="16" fill="#282e36"/>
    <rect x="120" y="120" width="272" height="16" fill="#282e36"/>
    <!-- Window dots -->
    <circle cx="146" cy="118" r="6" fill="#f85149"/>
    <circle cx="168" cy="118" r="6" fill="#d29922"/>
    <circle cx="190" cy="118" r="6" fill="#3fb950"/>

    <!-- Log lines with colored level indicators -->
    <!-- Line 1 - Info (blue) -->
    <rect x="144" y="156" width="6" height="6" rx="1" fill="#58a6ff"/>
    <rect x="158" y="156" width="60" height="6" rx="2" fill="#484f58"/>
    <rect x="226" y="156" width="140" height="6" rx="2" fill="#8b949e" opacity="0.5"/>

    <!-- Line 2 - Warning (yellow) -->
    <rect x="144" y="180" width="6" height="6" rx="1" fill="#d29922"/>
    <rect x="158" y="180" width="48" height="6" rx="2" fill="#484f58"/>
    <rect x="214" y="180" width="120" height="6" rx="2" fill="#8b949e" opacity="0.5"/>

    <!-- Line 3 - Error (red) - highlighted -->
    <rect x="138" y="198" width="242" height="22" rx="4" fill="#f8514920"/>
    <rect x="144" y="204" width="6" height="6" rx="1" fill="#f85149"/>
    <rect x="158" y="204" width="72" height="6" rx="2" fill="#484f58"/>
    <rect x="238" y="204" width="100" height="6" rx="2" fill="#8b949e" opacity="0.5"/>

    <!-- Line 4 - Debug (green) -->
    <rect x="144" y="232" width="6" height="6" rx="1" fill="#3fb950"/>
    <rect x="158" y="232" width="52" height="6" rx="2" fill="#484f58"/>
    <rect x="218" y="232" width="90" height="6" rx="2" fill="#8b949e" opacity="0.5"/>

    <!-- Line 5 - Info (blue) -->
    <rect x="144" y="256" width="6" height="6" rx="1" fill="#58a6ff"/>
    <rect x="158" y="256" width="44" height="6" rx="2" fill="#484f58"/>
    <rect x="210" y="256" width="130" height="6" rx="2" fill="#8b949e" opacity="0.5"/>

    <!-- Line 6 - Verbose (gray) -->
    <rect x="144" y="280" width="6" height="6" rx="1" fill="#8b949e"/>
    <rect x="158" y="280" width="56" height="6" rx="2" fill="#484f58"/>
    <rect x="222" y="280" width="110" height="6" rx="2" fill="#8b949e" opacity="0.5"/>

    <!-- Line 7 - Warning -->
    <rect x="144" y="304" width="6" height="6" rx="1" fill="#d29922"/>
    <rect x="158" y="304" width="64" height="6" rx="2" fill="#484f58"/>
    <rect x="230" y="304" width="80" height="6" rx="2" fill="#8b949e" opacity="0.5"/>

    <!-- Line 8 - Info (blue) -->
    <rect x="144" y="328" width="6" height="6" rx="1" fill="#58a6ff"/>
    <rect x="158" y="328" width="38" height="6" rx="2" fill="#484f58"/>
    <rect x="204" y="328" width="100" height="6" rx="2" fill="#8b949e" opacity="0.5"/>

    <!-- Line 9 - partial/faded -->
    <rect x="144" y="352" width="6" height="6" rx="1" fill="#8b949e" opacity="0.4"/>
    <rect x="158" y="352" width="50" height="6" rx="2" fill="#484f58" opacity="0.4"/>
    <rect x="216" y="352" width="70" height="6" rx="2" fill="#8b949e" opacity="0.2"/>
  </g>

  <!-- AI sparkle/analysis overlay (bottom-right) -->
  <g transform="translate(340, 310)">
    <circle cx="40" cy="40" r="44" fill="url(#accent)" opacity="0.9" filter="url(#innerGlow)"/>
    <!-- Magnifying glass / analysis icon -->
    <circle cx="34" cy="34" r="16" fill="none" stroke="#fff" stroke-width="3.5"/>
    <line x1="45" y1="45" x2="58" y2="58" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Sparkle dots suggesting AI -->
    <circle cx="22" cy="18" r="2.5" fill="#fff" opacity="0.9"/>
    <circle cx="56" cy="22" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="18" cy="54" r="1.5" fill="#fff" opacity="0.6"/>
  </g>

  <!-- ALA text -->
  <text x="256" y="448" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="#e6edf3" text-anchor="middle" letter-spacing="8">ALA</text>
</svg>
