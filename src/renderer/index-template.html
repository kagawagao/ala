<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Android Log Analyzer (ALA)</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' https: http:;">
  <script>
    // Polyfill for Node.js-style globals - ensures compatibility with Node.js-style packages
    if (typeof global === 'undefined') {
      window.global = window;
    }
    // Some packages check for 'require' to detect Node.js environment
    // In Electron renderer with nodeIntegration disabled, provide a stub
    if (typeof require === 'undefined') {
      window.require = undefined;
    }
    // Define process if not already defined (will be provided by webpack)
    if (typeof process === 'undefined') {
      window.process = { env: {} };
    }
  </script>
</head>
<body class="bg-dark-bg text-text-primary font-sans">
  <div id="root"></div>
</body>
</html>
